[supervisord]
nodaemon=true
logfile=/dev/stdout
logfile_maxbytes=0

[program:hedgedoc]
command=node app.js
directory=/hedgedoc
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
autorestart=true

[program:mcp]
command=node /opt/mcp/dist/index.js
directory=/opt/mcp
environment=HEDGEDOC_URL="http://localhost:8210",HEDGEDOC_PUBLIC_URL="%(ENV_HEDGEDOC_PUBLIC_URL)s",DATABASE_URL="%(ENV_DATABASE_URL)s",MCP_API_KEY="%(ENV_MCP_API_KEY)s"
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
autorestart=true
startsecs=5
startretries=10
