services:
  hedgedoc:
    build: .
    restart: always
    environment:
      CMD_DB_URL: postgres://hedgedoc:hedgedoc@db:5432/hedgedoc
      CMD_DOMAIN: ${CMD_DOMAIN:-localhost}
      CMD_PORT: 8210
      CMD_PROTOCOL_USESSL: "false"
      CMD_URL_ADDPORT: "true"
      CMD_URL_PATH: ""
      CMD_ALLOW_ANONYMOUS: "false"
      CMD_ALLOW_ANONYMOUS_EDITS: "false"
      CMD_EMAIL: "false"
      CMD_ALLOW_FREEURL: "true"
      CMD_DEFAULT_PERMISSION: freely
      CMD_IMAGE_UPLOAD_TYPE: filesystem
      CMD_SESSION_SECRET: ${CMD_SESSION_SECRET:-change-me-to-a-random-secret}
      # OAuth2 login
      # Authorization URL: browser-facing (must be reachable from user's machine)
      # Token + Userinfo URLs: server-side (must be reachable from inside container)
      CMD_OAUTH2_CLIENT_ID: ${CMD_OAUTH2_CLIENT_ID:-}
      CMD_OAUTH2_CLIENT_SECRET: ${CMD_OAUTH2_CLIENT_SECRET:-}
      CMD_OAUTH2_AUTHORIZATION_URL: ${CMD_OAUTH2_AUTHORIZATION_URL:-}
      CMD_OAUTH2_TOKEN_URL: ${CMD_OAUTH2_TOKEN_URL:-}
      CMD_OAUTH2_USER_PROFILE_URL: ${CMD_OAUTH2_USER_PROFILE_URL:-}
      CMD_OAUTH2_USER_PROFILE_USERNAME_ATTR: email
      CMD_OAUTH2_USER_PROFILE_DISPLAY_NAME_ATTR: name
      CMD_OAUTH2_USER_PROFILE_EMAIL_ATTR: email
      CMD_OAUTH2_USER_PROFILE_ID_ATTR: id
      CMD_OAUTH2_PROVIDERNAME: ${CMD_OAUTH2_PROVIDERNAME:-OAuth2}
      CMD_OAUTH2_SCOPE: imap profile
      HEDGEDOC_PUBLIC_URL: ${HEDGEDOC_PUBLIC_URL:-http://localhost:8210}
      DATABASE_URL: postgres://hedgedoc:hedgedoc@db:5432/hedgedoc
      MCP_API_KEY: ${MCP_API_KEY:-change-me-to-a-random-key}
    ports:
      - "8210:8210"
      - "8211:8211"
    depends_on:
      db:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - hedgedoc-uploads:/hedgedoc/public/uploads

  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: hedgedoc
      POSTGRES_PASSWORD: hedgedoc
      POSTGRES_DB: hedgedoc
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hedgedoc"]
      interval: 5s
      timeout: 3s
      retries: 5
    volumes:
      - hedgedoc-db:/var/lib/postgresql/data

volumes:
  hedgedoc-uploads:
  hedgedoc-db:
