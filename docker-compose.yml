services:
  hedgedoc:
    build: .
    restart: always
    network_mode: host
    environment:
      CMD_DB_URL: postgres://hedgedoc:hedgedoc@127.0.0.1:5433/hedgedoc
      CMD_DOMAIN: server.esteem.lan
      CMD_PORT: 8210
      CMD_PROTOCOL_USESSL: "false"
      CMD_URL_ADDPORT: "true"
      CMD_URL_PATH: ""
      CMD_ALLOW_ANONYMOUS: "true"
      CMD_ALLOW_ANONYMOUS_EDITS: "true"
      CMD_ALLOW_FREEURL: "true"
      CMD_DEFAULT_PERMISSION: freely
      CMD_EMAIL: "true"
      CMD_ALLOW_EMAIL_REGISTER: "true"
      CMD_IMAGE_UPLOAD_TYPE: filesystem
      CMD_SESSION_SECRET: change-me-to-a-random-secret
      CMD_LDAP_URL: ldap://127.0.0.1:389
      CMD_LDAP_BINDDN: CN=Administrator,CN=Users,DC=esteem,DC=lan
      CMD_LDAP_BINDCREDENTIALS: CHANGE_ME
      CMD_LDAP_SEARCHBASE: DC=esteem,DC=lan
      CMD_LDAP_SEARCHFILTER: (&(objectClass=person)(sAMAccountName={{username}}))
      CMD_LDAP_SEARCHATTRIBUTES: displayName,mail
      CMD_LDAP_USERNAMEFIELD: sAMAccountName
      CMD_LDAP_USERIDFIELD: objectGUID
      CMD_LDAP_PROVIDERNAME: Esteem AD
      HEDGEDOC_PUBLIC_URL: http://server.esteem.lan:8210
      DATABASE_URL: postgres://hedgedoc:hedgedoc@127.0.0.1:5433/hedgedoc
      MCP_API_KEY: change-me-to-a-random-key
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - hedgedoc-uploads:/hedgedoc/public/uploads

  db:
    image: postgres:16-alpine
    restart: always
    ports:
      - "127.0.0.1:5433:5432"
    environment:
      POSTGRES_USER: hedgedoc
      POSTGRES_PASSWORD: hedgedoc
      POSTGRES_DB: hedgedoc
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hedgedoc"]
      interval: 5s
      timeout: 3s
      retries: 5
    volumes:
      - hedgedoc-db:/var/lib/postgresql/data

volumes:
  hedgedoc-uploads:
  hedgedoc-db:
